name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  deploy:
    name: Deploy to Fly.io
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployment (MCP protocol)
        run: |
          echo "Waiting for server to be ready..."
          sleep 30

          MAX_RETRIES=3
          RETRY_DELAY=10

          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "=== Attempt $attempt of $MAX_RETRIES ==="

            echo "Sending initialize request..."
            INIT_RESPONSE=$(curl -s -D /tmp/headers.txt -X POST https://hexpm-mcp.fly.dev/mcp \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"deploy-check","version":"1.0"}}}')

            echo "Init response: $INIT_RESPONSE"

            SESSION_ID=$(grep -i "mcp-session-id" /tmp/headers.txt | cut -d' ' -f2 | tr -d '\r')
            echo "Session ID: $SESSION_ID"

            if [ -z "$SESSION_ID" ]; then
              echo "Failed to get session ID"
              if [ $attempt -lt $MAX_RETRIES ]; then
                echo "Retrying in ${RETRY_DELAY}s..."
                sleep $RETRY_DELAY
                continue
              fi
              exit 1
            fi

            sleep 3

            echo "Sending initialized notification..."
            curl -s -X POST https://hexpm-mcp.fly.dev/mcp \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -H "MCP-Session-Id: $SESSION_ID" \
              -d '{"jsonrpc":"2.0","method":"notifications/initialized"}'

            sleep 3

            echo "Sending test tool call..."
            TOOL_RESPONSE=$(curl -s -X POST https://hexpm-mcp.fly.dev/mcp \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -H "MCP-Session-Id: $SESSION_ID" \
              -d '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"search","arguments":{"query":"phoenix"}}}')

            echo "Tool response: $TOOL_RESPONSE"

            if echo "$TOOL_RESPONSE" | grep -q '"result"'; then
              echo "MCP protocol verification successful!"
              exit 0
            else
              echo "MCP protocol verification failed"
              if [ $attempt -lt $MAX_RETRIES ]; then
                echo "Retrying in ${RETRY_DELAY}s..."
                sleep $RETRY_DELAY
                continue
              fi
              exit 1
            fi
          done
